<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finan · Staff Cost Simulator T6/2026 · Anonymized Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700;800&display=swap');
:root{
  --bg:#080E18;--surface:#0E1826;--card:#131F30;--border:#1E3048;--border2:#243A56;
  --text:#C8D8E8;--sub:#6A8AAA;--dim:#3A5470;
  --gold:#E8B84B;--gold2:#F5D07A;--goldfade:rgba(232,184,75,.12);
  --teal:#29C4B0;--tealfade:rgba(41,196,176,.1);
  --red:#E05555;--redfade:rgba(224,85,85,.1);
  --green:#38C870;--greenfade:rgba(56,200,112,.1);
  --amber:#F09030;--purple:#9B72E8;--blue:#4A9EE8;
  --fh:'Sora',sans-serif;--fm:'DM Mono',monospace;
  --bu1:#29C4B0;--bu2:#9B72E8;--bu3:#4A9EE8;--bu4:#E8B84B;--bu5:#E05555;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fh);font-size:12.5px;line-height:1.5;overflow-x:hidden}

/* HEADER */
.hdr{background:linear-gradient(180deg,#0A1220,var(--bg));border-bottom:1px solid var(--border);padding:14px 24px 10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.hdr-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px}
.hdr-title span{color:var(--gold)}
.hdr-sub{font-size:10px;color:var(--sub);margin-top:1px;font-family:var(--fm)}
.hdr-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:4px;font-family:var(--fh);font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .15s;letter-spacing:.3px}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--sub)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-teal{background:var(--teal);color:#080E18}.btn-teal:hover{opacity:.85}
.btn-red{background:var(--redfade);border:1px solid rgba(224,85,85,.3);color:var(--red)}.btn-red:hover{background:rgba(224,85,85,.2)}

/* TABS */
.tabs-bar{background:var(--surface);border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:0}
.tab-btn{padding:9px 18px;font-size:11px;font-weight:700;color:var(--sub);background:none;border:none;cursor:pointer;letter-spacing:.5px;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* STRIP */
.strip{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 24px;display:flex;gap:0;overflow-x:auto}
.kpi{padding:0 18px;border-right:1px solid var(--border);text-align:center;white-space:nowrap;min-width:100px}
.kpi:first-child{padding-left:0}.kpi:last-child{border-right:none}
.kpi-lbl{font-size:9px;color:var(--sub);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--fm)}
.kpi-val{font-family:var(--fm);font-size:14px;font-weight:500;color:var(--gold);margin-top:1px}
.kpi-val.green{color:var(--green)}.kpi-val.teal{color:var(--teal)}.kpi-val.red{color:var(--red)}
.kpi-sub{font-size:9px;color:var(--dim);margin-top:1px}

/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:160px;max-width:240px}
.search-box input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:4px;padding:5px 9px 5px 26px;color:var(--text);font-family:var(--fm);font-size:11px}
.search-box input:focus{outline:none;border-color:var(--teal)}
.search-box::before{content:'⌕';position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;pointer-events:none}
.filter-sel{background:var(--card);border:1px solid var(--border2);border-radius:4px;padding:5px 7px;color:var(--text);font-family:var(--fm);font-size:11px;cursor:pointer}
.filter-sel:focus{outline:none;border-color:var(--teal)}
.alloc-hint{font-size:10px;color:var(--sub);margin-left:auto}
.alloc-hint strong{color:var(--amber)}

/* TABLE PAGES */
.page{display:none}.page.active{display:block}

/* TABLE */
.tbl-outer{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 240px)}
.tbl-outer::-webkit-scrollbar{height:6px;width:6px}
.tbl-outer::-webkit-scrollbar-track{background:var(--bg)}
.tbl-outer::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

table.sim{border-collapse:collapse;width:max-content;min-width:100%}
table.sim th{background:var(--surface);color:var(--sub);font-family:var(--fm);font-size:9px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;padding:7px 9px;border-bottom:2px solid var(--border2);white-space:nowrap;position:sticky;top:0;z-index:10;text-align:right}
table.sim th.left{text-align:left}
table.sim th.center{text-align:center}
table.sim th:nth-child(1),table.sim td:nth-child(1){position:sticky;left:0;z-index:12;background:inherit}
table.sim th:nth-child(1){background:var(--surface);z-index:20}

.th-bu1{color:var(--bu1)!important}.th-bu2{color:var(--bu2)!important}.th-bu3{color:var(--bu3)!important}.th-bu4{color:var(--bu4)!important}.th-bu5{color:var(--bu5)!important}
.th-out1{background:rgba(41,196,176,.05)!important;color:var(--bu1)!important}
.th-out2{background:rgba(155,114,232,.05)!important;color:var(--bu2)!important}
.th-out3{background:rgba(74,158,232,.05)!important;color:var(--bu3)!important}
.th-out4{background:rgba(232,184,75,.05)!important;color:var(--bu4)!important}
.th-out5{background:rgba(224,85,85,.05)!important;color:var(--bu5)!important}
.th-sep{border-left:1px solid var(--border2)!important}

tr.dept-hdr{background:var(--card)}
tr.dept-hdr td{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1.2px;padding:9px 10px 6px;border-top:2px solid var(--border2);border-bottom:1px solid var(--border)}
tr.dept-hdr td:first-child{border-left:3px solid var(--gold)}
tr.person-row{background:var(--bg);transition:background .1s}
tr.person-row:hover{background:#0C1520}
tr.person-row.inactive-row{opacity:.4}
tr.person-row td{border-bottom:1px solid var(--border);padding:5px 9px;vertical-align:middle;text-align:right}
tr.person-row td.left{text-align:left}
tr.person-row td.center{text-align:center}
tr.new-row td{background:rgba(41,196,176,.03);border-bottom:1px solid rgba(41,196,176,.12)}
tr.dept-total{background:var(--card)}
tr.dept-total td{padding:6px 9px;text-align:right;border-bottom:2px solid var(--border2);font-family:var(--fm);font-size:11px;font-weight:500;color:var(--gold);border-top:1px solid var(--border2)}
tr.dept-total td:first-child{text-align:left;font-size:10px;letter-spacing:.5px}
tr.grand-total{background:var(--surface)}
tr.grand-total td{padding:8px 9px;text-align:right;border-top:2px solid var(--gold);font-family:var(--fm);font-size:12px;font-weight:500;color:var(--gold2);position:sticky;bottom:0;z-index:9}
tr.grand-total td:first-child{text-align:left;font-size:11px;font-weight:700}

/* INPUTS */
.inp-adj{width:72px;background:var(--card);border:1px solid var(--border2);border-radius:3px;padding:3px 6px;color:var(--text);font-family:var(--fm);font-size:11px;text-align:right}
.inp-adj:focus{outline:none;border-color:var(--teal);background:#0E1F30}
.inp-alloc{width:50px;background:transparent;border:1px solid transparent;border-radius:3px;padding:3px 4px;color:var(--text);font-family:var(--fm);font-size:11px;text-align:center;transition:border .1s}
.inp-alloc:focus{outline:none;border-color:var(--teal);background:var(--card)}
.inp-alloc.bu1:focus{border-color:var(--bu1)}.inp-alloc.bu2:focus{border-color:var(--bu2)}.inp-alloc.bu3:focus{border-color:var(--bu3)}.inp-alloc.bu4:focus{border-color:var(--bu4)}.inp-alloc.bu5:focus{border-color:var(--bu5)}
.inp-alloc.over{background:rgba(224,85,85,.12);border-color:rgba(224,85,85,.4)!important;color:var(--red)!important}
.inp-alloc.full{background:rgba(56,200,112,.07);border-color:rgba(56,200,112,.25)}
.inp-alloc.dim-bu{opacity:.22;background:rgba(255,255,255,.01)}
.alloc-sum{display:inline-block;min-width:28px;text-align:center;font-family:var(--fm);font-size:10px;border-radius:2px;padding:1px 4px}
.alloc-sum.ok{background:rgba(56,200,112,.15);color:var(--green)}.alloc-sum.over{background:rgba(224,85,85,.15);color:var(--red)}.alloc-sum.zero{color:var(--dim)}

/* STATUS & DELETE */
.status-toggle{cursor:pointer;padding:2px 7px;border-radius:3px;font-family:var(--fm);font-size:10px;font-weight:500;border:none;transition:all .15s;white-space:nowrap}
.status-toggle.active{background:rgba(56,200,112,.15);color:var(--green);border:1px solid rgba(56,200,112,.3)}
.status-toggle.inactive{background:rgba(224,85,85,.1);color:var(--red);border:1px solid rgba(224,85,85,.2)}
.del-btn{background:rgba(224,85,85,.12);border:1px solid rgba(224,85,85,.2);color:var(--red);border-radius:3px;padding:2px 6px;cursor:pointer;font-size:11px;font-family:var(--fm);line-height:1}
.del-btn:hover{background:rgba(224,85,85,.25)}

/* PL SELECT */
.pl-select{background:var(--card);border:1px solid var(--border2);border-radius:3px;padding:2px 5px;color:var(--sub);font-family:var(--fm);font-size:9px;max-width:175px;cursor:pointer}
.pl-select:focus{outline:none;border-color:var(--purple);color:var(--text)}

/* NAME CELL */
.name-cell{display:flex;flex-direction:column;min-width:150px}
.name-main{font-weight:600;color:#fff;font-size:12px}
.name-pos{font-size:9px;color:var(--sub);margin-top:1px}
.name-new{font-size:9px;color:var(--teal);font-family:var(--fm)}

/* OUTPUT VALS */
.out-val{font-family:var(--fm);font-size:11px}
.out-val.has-val{font-weight:500}
.out-val.bu1{color:var(--bu1)}.out-val.bu2{color:var(--bu2)}.out-val.bu3{color:var(--bu3)}.out-val.bu4{color:var(--bu4)}.out-val.bu5{color:var(--bu5)}

/* SUMMARY SHEET */
.summary-wrap{padding:20px 24px;display:flex;flex-direction:column;gap:20px}
.sec-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid rgba(232,184,75,.2);margin-bottom:12px}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sum-box{background:var(--surface);border:1px solid var(--border2);border-radius:4px;overflow-x:auto}
.sum-tbl{width:100%;border-collapse:collapse;font-size:11.5px}
.sum-tbl th{background:rgba(232,184,75,.07);font-family:var(--fm);font-size:9px;font-weight:500;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;padding:7px 10px;text-align:right;border-bottom:1px solid var(--border2);white-space:nowrap}
.sum-tbl th:first-child{text-align:left}
.sum-tbl td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.03);text-align:right;font-family:var(--fm);white-space:nowrap}
.sum-tbl td:first-child{text-align:left;color:var(--text);font-weight:600}
.sum-tbl tr:hover td{background:rgba(255,255,255,.02)}
.sum-tbl tr.sum-total td{background:rgba(232,184,75,.07);color:var(--gold2);font-weight:700;border-top:2px solid rgba(232,184,75,.25);border-bottom:none}
.sum-tbl tr.sum-total td:first-child{text-align:left}
.note-box{padding:8px 12px;font-size:10px;color:var(--dim)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:22px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-field{display:flex;flex-direction:column;gap:3px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:10px;color:var(--sub);font-family:var(--fm);letter-spacing:.5px;text-transform:uppercase}
.form-field input,.form-field select{background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:6px 9px;color:var(--text);font-family:var(--fm);font-size:12px}
.form-field input:focus,.form-field select:focus{outline:none;border-color:var(--teal)}
.form-field input[readonly]{background:rgba(41,196,176,.05);border-color:rgba(41,196,176,.2);color:var(--teal)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">FINAN · <span>Staff Cost Simulator</span> — T6/2026 · Anonymized Demo</div>
      <div class="hdr-sub">Base: Company Expense T5 (incl. Lương 13) · 125 nhân sự · ACC 642111</div>
    </div>
    <div class="hdr-actions">
      <button class="btn btn-ghost" onclick="openModal()">＋ Thêm nhân sự</button>
      <button class="btn btn-ghost" onclick="triggerImportCSV()" title="Import CSV từ file export trước">⬆ Import CSV</button>
      <input type="file" id="csv-file-input" accept=".csv" style="display:none" onchange="importCSV(event)">
      <button class="btn btn-ghost" onclick="resetAlloc()">↺ Reset Alloc</button>
      <button class="btn btn-red" onclick="clearSavedState()" title="Reset về T5 gốc">✕ Clear Save</button>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn btn-ghost" onclick="exportSummaryCSV()">⬇ Summary CSV</button>
      <button class="btn btn-teal" onclick="exportJSON()">⬇ JSON</button>
      <span id="save-indicator" style="font-size:10px;color:var(--dim);font-family:var(--fm)">—</span>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="showTab('simulator',this)">📋 Simulator</button>
  <button class="tab-btn" onclick="showTab('summary',this)">📊 Summary</button>
</div>

<!-- STRIP -->
<div class="strip" id="strip"></div>

<!-- TOOLBAR (simulator only) -->
<div class="toolbar" id="toolbar">
  <div class="search-box"><input type="text" id="search" placeholder="Tìm tên, chức danh..." oninput="filterTable()"></div>
  <select class="filter-sel" id="filter-dept" onchange="filterTable()">
    <option value="">Tất cả phòng ban</option>
    <option>MANAGEMENT</option><option>ACCOUNTING & FINANCE</option><option>HR</option>
    <option>CUSTOMER SERVICE & SUCCESS</option><option>MARKETING</option>
    <option>PARTNERSHIP</option><option>PRODUCT MANAGEMENT</option><option>PRODUCT OPS</option>
    <option>SALES & BUSINESS DEVELOPMENT</option><option>SYSTEM & ENGINEERING</option>
  </select>
  <select class="filter-sel" id="filter-status" onchange="filterTable()">
    <option value="">Tất cả status</option>
    <option value="active">Active</option><option value="inactive">Inactive</option>
  </select>
  <select class="filter-sel" id="filter-pl" onchange="filterTable()">
    <option value="">Tất cả P&L line</option>
    <option>4.1 Staff cost — Salary</option><option>6.1 Staff - Customer Operation</option>
    <option>6.3 Staff - Product Development</option><option>6.4 Staff - Technology</option>
    <option>6.5 Staff - Marketing</option><option>7.1 Staff - Management</option>
    <option>7.2 Staff - Accounting & Finance</option><option>7.3 Staff - Human Resource</option>
    <option>7.4 Staff - Partnership</option>
  </select>
  <div class="alloc-hint">% alloc · bước nhảy 10% · <strong>Tổng = 100%</strong></div>
</div>

<!-- PAGE: SIMULATOR -->
<div class="page active" id="page-simulator">
  <div class="tbl-outer">
    <table class="sim">
      <thead id="sim-thead"></thead>
      <tbody id="sim-tbody"></tbody>
    </table>
  </div>
</div>

<!-- PAGE: SUMMARY -->
<div class="page" id="page-summary">
  <div class="summary-wrap" id="summary-content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>＋ Thêm nhân sự mới (T6)</h2>
    <div class="form-grid">
      <div class="form-field full">
        <label>Họ và Tên *</label>
        <input type="text" id="new-name" placeholder="Alex Carter">
      </div>
      <div class="form-field">
        <label>Chức danh</label>
        <input type="text" id="new-position" placeholder="Software Engineer">
      </div>
      <div class="form-field">
        <label>Phòng ban *</label>
        <select id="new-dept">
          <option value="MANAGEMENT">Management</option>
          <option value="ACCOUNTING & FINANCE">Accounting & Finance</option>
          <option value="HR">HR</option>
          <option value="CUSTOMER SERVICE & SUCCESS">Customer Service & Success</option>
          <option value="MARKETING">Marketing</option>
          <option value="PARTNERSHIP">Partnership</option>
          <option value="PRODUCT MANAGEMENT">Product Management</option>
          <option value="PRODUCT OPS">Product OPS</option>
          <option value="SALES & BUSINESS DEVELOPMENT">Sales & Business Development</option>
          <option value="SYSTEM & ENGINEERING">System & Engineering</option>
        </select>
      </div>
      <div class="form-field">
        <label>Gross Salary/tháng (M VND)</label>
        <input type="number" id="new-gross" placeholder="20" step="0.5" oninput="autoCalcBase()">
      </div>
      <div class="form-field">
        <label>Company Expense Base (M VND) <span style="color:var(--teal);font-size:9px">= Gross × 1.30</span></label>
        <input type="number" id="new-base" placeholder="26" step="0.5" readonly>
      </div>
      <div class="form-field">
        <label>Salary Adjustment (M VND)</label>
        <input type="number" id="new-adj" placeholder="0" step="0.5">
      </div>
      <div class="form-field full">
        <label>P&L Line</label>
        <select id="new-pl">
          <option>4.1 Staff cost — Salary</option><option>6.1 Staff - Customer Operation</option>
          <option>6.3 Staff - Product Development</option><option>6.4 Staff - Technology</option>
          <option>6.5 Staff - Marketing</option><option>7.1 Staff - Management</option>
          <option>7.2 Staff - Accounting & Finance</option><option>7.3 Staff - Human Resource</option>
          <option>7.4 Staff - Partnership</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-teal" onclick="addPerson()">Thêm nhân sự</button>
    </div>
  </div>
</div>

let persons = PERSONS_RAW.map(p=>({...p, alloc:{...p.alloc}}));

// ── HELPERS ──
const fmtMc = n => {if(!n||n===0)return'—';const v=n/1e6;return(v>=1?v.toFixed(1):v.toFixed(2))+'tr';};
const fmtMl = n => n===0?'—':(n/1e6).toFixed(1)+'tr';
const num = s => parseFloat(s)||0;
function effectiveCost(p){ if(p.status==='inactive') return 0; return p.base + (p.adj||0); }
function allocSum(p){ return BUS.reduce((s,b)=>s+num(p.alloc[b.key]),0); }
function buCost(p,buKey){ return effectiveCost(p) * num(p.alloc[buKey]) / 100; }
function getValidBUs(pl){ return PL_COA_MAP[pl]||BUS.map(b=>b.key); }
function getAutoAlloc(pl){ const v=getValidBUs(pl); return v.length===1?v[0]:null; }
function applyAutoAlloc(p){ const a=getAutoAlloc(p.pl_line); if(a) BUS.forEach(b=>{p.alloc[b.key]=b.key===a?100:0;}); }

// ── TAB NAV ──
function showTab(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  document.getElementById('toolbar').style.display = id==='simulator'?'flex':'none';
  if(id==='summary') buildSummary();
}

// ── BUILD HEADER ──
function buildHeader(){
  const tr=document.createElement('tr');
  const fixed=[
    {l:'Nhân sự',cls:'left',style:'min-width:165px'},

    {l:'Adj\n(M VND)',cls:'',style:'min-width:76px',title:'Lương trả nước ngoài / hình thức khác'},
    {l:'Total Eff.Cost\n=Base+Adj',cls:'',style:'min-width:94px'},
    {l:'Status',cls:'center',style:'min-width:68px'},
    {l:'Del',cls:'center',style:'min-width:34px'},
    {l:'Alloc\nSum',cls:'center',style:'min-width:50px'},
  ];
  fixed.forEach(f=>{
    const th=document.createElement('th');

    th.innerHTML=f.l.replace('\n','<br>');
    tr.appendChild(th);
  });
  BUS.forEach(b=>{
    const th=document.createElement('th');
    th.innerHTML=`${b.short}<br><span style="font-size:8px;opacity:.55">% alloc</span>`;
    th.className=`${b.thcls} th-sep`; th.style.cssText='min-width:58px';
    tr.appendChild(th);
  });
  BUS.forEach(b=>{
    const th=document.createElement('th');
    th.innerHTML=`${b.short}<br><span style="font-size:8px;opacity:.55">cost</span>`;
    th.className=`${b.outcls} th-sep`; th.style.cssText='min-width:68px';
    tr.appendChild(th);
  });
  document.getElementById('sim-thead').appendChild(tr);
}

// ── FILTER ──
function getFiltered(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const dept=document.getElementById('filter-dept')?.value||'';
  const status=document.getElementById('filter-status')?.value||'';
  const pl=document.getElementById('filter-pl')?.value||'';
  return persons.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!p.position.toLowerCase().includes(q)) return false;
    if(dept&&p.dept!==dept) return false;
    if(status&&p.status!==status) return false;
    if(pl&&p.pl_line!==pl) return false;
    return true;
  });
}

// ── BUILD TABLE ──
function buildTable(){
  const tbody=document.getElementById('sim-tbody'); tbody.innerHTML='';
  const filtered=getFiltered();
  const deptFiltered=document.getElementById('filter-dept')?.value||'';
  const depts=deptFiltered?[deptFiltered]:DEPT_ORDER;
  const numCols=9+BUS.length*2;

  depts.forEach(dept=>{
    const rows=filtered.filter(p=>p.dept===dept);
    if(!rows.length) return;

    // Dept header
    const dhr=document.createElement('tr'); dhr.className='dept-hdr';
    const deptLabel=DEPT_LABELS[dept]||dept;
    const dActive=rows.filter(p=>p.status==='active');
    dhr.innerHTML=`<td colspan="${numCols}">${deptLabel} <span style="color:var(--sub);font-size:9px;font-weight:400;font-family:var(--fm)">${rows.length} người · active: ${dActive.length} · ${fmtMl(dActive.reduce((s,p)=>s+effectiveCost(p),0))}</span></td>`;
    tbody.appendChild(dhr);

    rows.forEach(p=>{
      const tr=document.createElement('tr');
      tr.className='person-row'+(p.status==='inactive'?' inactive-row':'')+(p._new?' new-row':'');
      tr.id=`row-${p.id}`;
      const ec=effectiveCost(p);
      const as=allocSum(p);
      const asOver=as>100.01; const asOk=Math.abs(as-100)<0.01;
      const validBUs=getValidBUs(p.pl_line);

      // 1 Name
      const tdN=document.createElement('td'); tdN.className='left';
      tdN.innerHTML=`<div class="name-cell"><span class="name-main">${p.name}</span><span class="name-pos">${p.position||''}</span>${p._new?'<span class="name-new">✦ NEW T6</span>':''}</div>`;
      tr.appendChild(tdN);

      // 2 PL line
      const tdPL=document.createElement('td'); tdPL.className='left';
      const sel=document.createElement('select'); sel.className='pl-select';
      PL_LINES.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;if(l===p.pl_line)o.selected=true;sel.appendChild(o);});
      sel.onchange=e=>{p.pl_line=e.target.value;applyAutoAlloc(p);buildTable();updateStrip();saveState();};
      tdPL.appendChild(sel); tr.appendChild(tdPL);

      // 3 Fixed income
      const tdInc=document.createElement('td');
      tdInc.innerHTML=`<span style="font-family:var(--fm);font-size:11px;color:var(--dim)">${fmtMc(p.income||0)}</span>`;
      tr.appendChild(tdInc);

      // 4 Base
      const tdBase=document.createElement('td');
      tdBase.innerHTML=`<span style="font-family:var(--fm);font-size:11px;color:var(--sub)">${fmtMc(p.base)}</span>`;
      tr.appendChild(tdBase);

      // 5 Adj (M VND input)
      const tdAdj=document.createElement('td');
      const inp=document.createElement('input'); inp.className='inp-adj'; inp.type='number'; inp.placeholder='0'; inp.step='0.5';
      inp.value=p.adj?+(p.adj/1e6).toFixed(2):'';
      inp.oninput=e=>{p.adj=Math.round((parseFloat(e.target.value)||0)*1e6);refreshRow(p.id);updateStrip();saveState();};
      tdAdj.appendChild(inp); tr.appendChild(tdAdj);

      // 6 Total Eff Cost = Base + Adj
      const tdEC=document.createElement('td'); tdEC.id=`ec-${p.id}`;
      const ecColor=p.status==='inactive'?'var(--dim)':p.adj?'var(--teal)':'#fff';
      tdEC.innerHTML=`<span style="font-family:var(--fm);font-size:11.5px;font-weight:500;color:${ecColor}" title="Base: ${fmtMc(p.base)} + Adj: ${fmtMc(p.adj||0)}">${fmtMc(ec)}</span>`;
      tr.appendChild(tdEC);

      // 7 Status
      const tdS=document.createElement('td'); tdS.className='center';
      const sbtn=document.createElement('button'); sbtn.className=`status-toggle ${p.status}`;
      sbtn.textContent=p.status==='active'?'Active':'Inactive';
      sbtn.onclick=()=>{p.status=p.status==='active'?'inactive':'active';buildTable();updateStrip();saveState();};
      tdS.appendChild(sbtn); tr.appendChild(tdS);

      // 8 Delete (new only)
      const tdD=document.createElement('td'); tdD.className='center';
      if(p._new){
        const db=document.createElement('button'); db.className='del-btn'; db.textContent='✕'; db.title='Xoá nhân sự này';
        db.onclick=()=>{persons=persons.filter(x=>x.id!==p.id);buildTable();updateStrip();saveState();};
        tdD.appendChild(db);
      }
      tr.appendChild(tdD);

      // 9 Alloc sum
      const tdAS=document.createElement('td'); tdAS.className='center'; tdAS.id=`as-${p.id}`;
      tdAS.innerHTML=`<span class="alloc-sum ${asOver?'over':asOk?'ok':'zero'}">${as.toFixed(0)}%</span>`;
      tr.appendChild(tdAS);

      // 10 BU alloc inputs
      BUS.forEach((b,bi)=>{
        const td=document.createElement('td'); if(bi===0) td.className='th-sep';
        const isValid=validBUs.includes(b.key);
        const ai=document.createElement('input');
        ai.className=`inp-alloc ${b.cls}${asOver?' over':asOk?' full':''}${!isValid?' dim-bu':''}`;
        ai.type='number'; ai.min='0'; ai.max='100'; ai.step='10'; // step 10%
        ai.value=p.alloc[b.key]||''; ai.placeholder='0';
        if(!isValid) ai.title=`${b.label} không trong COA của line này`;
        ai.oninput=e=>{p.alloc[b.key]=parseFloat(e.target.value)||0;refreshRow(p.id);updateStrip();saveState();};
        td.appendChild(ai); tr.appendChild(td);
      });

      // 11 BU output cost
      BUS.forEach((b,bi)=>{
        const td=document.createElement('td'); td.id=`out-${p.id}-${b.key}`;
        if(bi===0) td.className='th-sep';
        const isValid=validBUs.includes(b.key);
        const cost=buCost(p,b.key);
        const dimStyle=!isValid&&cost===0?'opacity:.2':'';
        td.innerHTML=`<span class="out-val ${cost>0?b.cls+' has-val':''}" style="${dimStyle}">${cost>0?fmtMc(cost):'—'}</span>`;
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    // Dept subtotal
    const stId=`st-${dept.replace(/\W/g,'_')}`;
    const stRow=document.createElement('tr'); stRow.className='dept-total'; stRow.id=stId;
    const totA=rows.filter(p=>p.status==='active');
    const dEC=totA.reduce((s,p)=>s+effectiveCost(p),0);
    const dAdj=totA.reduce((s,p)=>s+(p.adj||0),0);
    let stHtml=`<td>↳ ${deptLabel} SUBTOTAL (${totA.length} active)</td>
      <td></td>
      <td style="color:var(--dim);font-family:var(--fm)">${fmtMc(totA.reduce((s,p)=>s+(p.income||0),0))}</td>
      <td style="font-family:var(--fm)"><span data-st="base">${fmtMc(totA.reduce((s,p)=>s+p.base,0))}</span></td>
      <td style="font-family:var(--fm);color:${dAdj?'var(--amber)':'var(--dim)'}"><span data-st="adj">${dAdj?fmtMc(dAdj):'—'}</span></td>
      <td><span data-st="ec">${fmtMc(dEC)}</span></td>
      <td></td><td></td><td></td>`;
    BUS.forEach(()=>stHtml+='<td></td>');
    BUS.forEach((b,bi)=>{
      const bT=totA.reduce((s,p)=>s+buCost(p,b.key),0);
      stHtml+=`<td${bi===0?' class="th-sep"':''}><span data-st="${b.key}" style="color:var(--${b.cls});font-family:var(--fm)">${bT>0?fmtMc(bT):'—'}</span></td>`;
    });
    stRow.innerHTML=stHtml; tbody.appendChild(stRow);
  });

  // Grand total
  const active=persons.filter(p=>p.status==='active');
  const gEC=active.reduce((s,p)=>s+effectiveCost(p),0);
  const gBase=active.reduce((s,p)=>s+p.base,0);
  const gAdj=active.reduce((s,p)=>s+(p.adj||0),0);
  const gtr=document.createElement('tr'); gtr.className='grand-total'; gtr.id='grand-total-row';
  let gHtml=`<td>GRAND TOTAL — ${active.length} ACTIVE / ${persons.length} TOTAL</td>
    <td></td>
    <td style="color:var(--dim);font-family:var(--fm)">${fmtMc(active.reduce((s,p)=>s+(p.income||0),0))}</td>
    <td style="font-family:var(--fm)"><span data-gt="base">${fmtMc(gBase)}</span></td>
    <td style="font-family:var(--fm);color:var(--amber)"><span data-gt="adj">${gAdj?fmtMc(gAdj):'—'}</span></td>
    <td style="font-family:var(--fm);font-size:13px;color:var(--gold2)"><span data-gt="ec">${fmtMc(gEC)}</span></td>
    <td></td><td></td><td></td>`;
  BUS.forEach(()=>gHtml+='<td></td>');
  BUS.forEach((b,bi)=>{
    const bT=active.reduce((s,p)=>s+buCost(p,b.key),0);
    gHtml+=`<td${bi===0?' class="th-sep"':''}><span data-gt="${b.key}" style="color:var(--${b.cls});font-weight:700;font-family:var(--fm);font-size:12px">${bT>0?fmtMc(bT):'—'}</span></td>`;
  });
  gtr.innerHTML=gHtml; tbody.appendChild(gtr);
}

// ── REFRESH ROW + SUBTOTALS ──
function refreshRow(id){
  const p=persons.find(x=>x.id===id); if(!p) return;
  const ec=effectiveCost(p); const as=allocSum(p);
  const asOver=as>100.01; const asOk=Math.abs(as-100)<0.01;

  const ecEl=document.getElementById(`ec-${id}`);
  if(ecEl){
    const ecColor=p.status==='inactive'?'var(--dim)':p.adj?'var(--teal)':'#fff';
    ecEl.innerHTML=`<span style="font-family:var(--fm);font-size:11.5px;font-weight:500;color:${ecColor}" title="Base: ${fmtMc(p.base)} + Adj: ${fmtMc(p.adj||0)}">${fmtMc(ec)}</span>`;
  }
  const asEl=document.getElementById(`as-${id}`);
  if(asEl) asEl.innerHTML=`<span class="alloc-sum ${asOver?'over':asOk?'ok':'zero'}">${as.toFixed(0)}%</span>`;

  BUS.forEach(b=>{
    const el=document.getElementById(`out-${id}-${b.key}`);
    if(el){const cost=buCost(p,b.key);el.innerHTML=`<span class="out-val ${cost>0?b.cls+' has-val':''}">${cost>0?fmtMc(cost):'—'}</span>`;}
  });

  // Dept subtotal
  const stEl=document.getElementById(`st-${p.dept.replace(/\W/g,'_')}`);
  if(stEl){
    const deptP=persons.filter(x=>x.dept===p.dept&&x.status==='active');
    const dEC=deptP.reduce((s,x)=>s+effectiveCost(x),0);
    const dAdj=deptP.reduce((s,x)=>s+(x.adj||0),0);
    const dBase=deptP.reduce((s,x)=>s+x.base,0);
    stEl.querySelectorAll('[data-st]').forEach(c=>{
      const r=c.getAttribute('data-st');
      if(r==='base') c.textContent=fmtMc(dBase);
      else if(r==='adj'){c.textContent=dAdj?fmtMc(dAdj):'—';c.parentElement.style.color=dAdj?'var(--amber)':'var(--dim)';}
      else if(r==='ec') c.textContent=fmtMc(dEC);
      else{const bT=deptP.reduce((s,x)=>s+buCost(x,r),0);c.textContent=bT>0?fmtMc(bT):'—';}
    });
  }
  // Grand total
  const gEl=document.getElementById('grand-total-row');
  if(gEl){
    const act=persons.filter(x=>x.status==='active');
    const gEC=act.reduce((s,x)=>s+effectiveCost(x),0);
    const gAdj=act.reduce((s,x)=>s+(x.adj||0),0);
    const gBase=act.reduce((s,x)=>s+x.base,0);
    gEl.querySelectorAll('[data-gt]').forEach(c=>{
      const r=c.getAttribute('data-gt');
      if(r==='base') c.textContent=fmtMc(gBase);
      else if(r==='adj') c.textContent=gAdj?fmtMc(gAdj):'—';
      else if(r==='ec') c.textContent=fmtMc(gEC);
      else{const bT=act.reduce((s,x)=>s+buCost(x,r),0);c.textContent=bT>0?fmtMc(bT):'—';}
    });
  }
}

// ── STRIP ──
function updateStrip(){
  const active=persons.filter(p=>p.status==='active');
  const gEC=active.reduce((s,p)=>s+effectiveCost(p),0);
  const gBase=active.reduce((s,p)=>s+p.base,0);
  const gAdj=active.reduce((s,p)=>s+(p.adj||0),0);
  const inactive=persons.filter(p=>p.status==='inactive').length;
  const allocated=active.filter(p=>Math.abs(allocSum(p)-100)<0.5).length;
  const buTotals=BUS.map(b=>active.reduce((s,p)=>s+buCost(p,b.key),0));
  const totalAllocated=buTotals.reduce((s,v)=>s+v,0);
  const strip=document.getElementById('strip');
  const kpis=[
    {lbl:'Total Cost Active',val:fmtMl(gEC),sub:`${active.length} nhân sự`,cls:''},
    {lbl:'Base (T5)',val:fmtMl(gBase),sub:'incl. Lương 13',cls:''},
    {lbl:'Adj. thêm',val:gAdj?fmtMl(gAdj):'—',sub:'Lương khác',cls:gAdj?'teal':''},
    {lbl:'Inactive',val:inactive,sub:'Không tính T6',cls:inactive?'red':''},
    {lbl:'Alloc 100%',val:`${allocated}/${active.length}`,sub:'hoàn thiện',cls:allocated===active.length?'green':''},
    {lbl:'Allocated cost',val:fmtMl(totalAllocated),sub:`${gEC?((totalAllocated/gEC)*100).toFixed(0):0}% tổng`,cls:'teal'},
    ...BUS.map((b,i)=>({lbl:b.short,val:fmtMl(buTotals[i]),sub:b.label,cls:['','','','',''][i]})),
  ];
  strip.innerHTML=kpis.map(k=>`<div class="kpi"><div class="kpi-lbl">${k.lbl}</div><div class="kpi-val ${k.cls}">${k.val}</div><div class="kpi-sub">${k.sub}</div></div><div style="width:1px;background:var(--border);flex-shrink:0"></div>`).join('').replace(/<div style[^>]+><\/div>$/,'');
}

// ── SUMMARY SHEET ──
function buildSummary(){
  const active=persons.filter(p=>p.status==='active');
  const wrap=document.getElementById('summary-content');

  // 1. By BU/Segment
  const buTotals=BUS.map(b=>({...b,total:active.reduce((s,p)=>s+buCost(p,b.key),0),hc:active.filter(p=>p.alloc[b.key]>0).length}));
  const buGrand=buTotals.reduce((s,b)=>s+b.total,0);
  const gEC=active.reduce((s,p)=>s+effectiveCost(p),0);

  // 2. By P&L Line
  const plTotals=PL_LINES.map(l=>{
    const lp=active.filter(p=>p.pl_line===l);
    const total=lp.reduce((s,p)=>s+effectiveCost(p),0);
    const allocated=lp.reduce((s,p)=>s+BUS.reduce((ss,b)=>ss+buCost(p,b.key),0),0);
    return {l2:l, hc:lp.length, total, allocated, unalloc:total-allocated};
  });

  // 3. Cross table: PL Line × BU
  const crossData={};
  PL_LINES.forEach(l=>{crossData[l]={};BUS.forEach(b=>{crossData[l][b.key]=active.filter(p=>p.pl_line===l).reduce((s,p)=>s+buCost(p,b.key),0);});});

  // 4. Drill-down data: BU → PL Line → persons
  const drillData=BUS.map(b=>{
    const plGroups=PL_LINES.map(l=>{
      const pp=active.filter(p=>p.pl_line===l&&p.alloc[b.key]>0);
      const cost=pp.reduce((s,p)=>s+buCost(p,b.key),0);
      return{l2:l,cost,persons:pp.map(p=>({name:p.name,position:p.position,dept:DEPT_LABELS[p.dept]||p.dept,ec:effectiveCost(p),pct:p.alloc[b.key]||0,cost:buCost(p,b.key)})).sort((a,b)=>b.cost-a.cost)};
    }).filter(g=>g.cost>0);
    return{...b,plGroups,buTotal:plGroups.reduce((s,g)=>s+g.cost,0)};
  }).filter(b=>b.buTotal>0);

  wrap.innerHTML=`
  <div>
    <div class="sec-title">Chi phí theo BU / Segment</div>
    <div class="sum-box">
      <table class="sum-tbl">
        <thead><tr>
          <th>BU / Segment</th>
          <th>Cost (tr)</th>
          <th>% Tổng EC</th>
          <th>Nhân sự</th>
          <th>Avg/người</th>
        </tr></thead>
        <tbody>
          ${buTotals.map(b=>`<tr>
            <td><span style="display:inline-block;width:8px;height:8px;background:var(--${b.cls});border-radius:2px;margin-right:6px;vertical-align:middle"></span>${b.label}</td>

            <td>${b.hc}</td>
            <td style="color:var(--sub)">${b.hc?fmtMl(b.total/b.hc):'—'}</td>
          </tr>`).join('')}
          <tr class="sum-total">
            <td>TOTAL ALLOCATED</td>
            <td>${fmtMl(buGrand)}</td>
            <td>${gEC?(buGrand/gEC*100).toFixed(1):0}%</td>
            <td>—</td><td>—</td>
          </tr>
          <tr>
            <td style="color:var(--amber)">Chưa phân bổ</td>
            <td style="color:var(--amber)">${fmtMl(gEC-buGrand)}</td>
            <td style="color:var(--amber)">${gEC?((gEC-buGrand)/gEC*100).toFixed(1):0}%</td>
            <td>—</td><td>—</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div>
    <div class="sec-title">Chi phí theo P&L Line</div>
    <div class="sum-box">
      <table class="sum-tbl">
        <thead><tr>
          <th>P&L L2 Line</th>
          <th>HC</th>
          <th>Total Cost</th>
          <th>Allocated</th>
          <th>Unalloc</th>
          <th>% Total</th>
        </tr></thead>
        <tbody>
          ${plTotals.map(row=>`<tr>
            <td>${row.l2}</td>
            <td style="color:var(--sub)">${row.hc}</td>
            <td style="color:#fff;font-weight:600">${fmtMl(row.total)}</td>
            <td style="color:var(--teal)">${fmtMl(row.allocated)}</td>
            <td style="color:${row.unalloc>0?'var(--amber)':'var(--green)'}">${fmtMl(row.unalloc)}</td>
            <td style="color:var(--sub)">${gEC?(row.total/gEC*100).toFixed(1):0}%</td>
          </tr>`).join('')}
          <tr class="sum-total">
            <td>GRAND TOTAL</td>
            <td>${active.length}</td>
            <td>${fmtMl(gEC)}</td>
            <td>${fmtMl(buGrand)}</td>
            <td style="color:${(gEC-buGrand)>0?'var(--amber)':'var(--green)'}">${fmtMl(gEC-buGrand)}</td>
            <td>100%</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div>
    <div class="sec-title">Cross Table: P&L Line × BU / Segment (triệu VND)</div>
    <div class="sum-box">
      <table class="sum-tbl">
        <thead><tr>
          <th>P&L Line</th>
          ${BUS.map(b=>`<th style="color:var(--${b.cls})">${b.short}</th>`).join('')}

        </tr></thead>

          ${PL_LINES.map(l=>{

          </tr>

    </div>

  // Render first BU drill-down

            ${g.persons.map((p,pi)=>`
            <tr style="${pi%2===0?'':'background:rgba(255,255,255,.015)'}">
              <td style="color:#fff;font-weight:600;padding-left:20px">${p.name}</td>

function filterTable(){buildTable();updateStrip();}

// ── RESET ALLOC ──
function resetAlloc(){
  if(!confirm('Reset toàn bộ % phân bổ?')) return;
  persons.forEach(p=>{BUS.forEach(b=>{p.alloc[b.key]=0;});});
  buildTable();updateStrip();saveState();
}

// ── MODAL ──
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function autoCalcBase(){
  const g=parseFloat(document.getElementById('new-gross').value)||0;
  document.getElementById('new-base').value=g>0?(g*1.30).toFixed(1):'';
}
function addPerson(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){alert('Nhập tên nhân sự');return;}
  const dept=document.getElementById('new-dept').value;
  const baseM=parseFloat(document.getElementById('new-base').value)||0;
  if(!baseM){alert('Nhập Gross Salary để tính Base');return;}
  const np={
    id:Date.now(), name, position:document.getElementById('new-position').value,
    dept, dept_label:DEPT_LABELS[dept]||dept,
    income:Math.round((parseFloat(document.getElementById('new-gross').value)||0)*1e6),
    base:Math.round(baseM*1e6),
    adj:Math.round((parseFloat(document.getElementById('new-adj').value)||0)*1e6),
    status:'active', pl_line:document.getElementById('new-pl').value,
    alloc:{SBH_own:0,SBH_partner:0,HLB:0,BU3:0,CSS:0}, _new:true,
  };
  applyAutoAlloc(np);
  persons.push(np);
  closeModal();
  ['new-name','new-position','new-gross','new-base','new-adj'].forEach(id=>document.getElementById(id).value='');
  buildTable();updateStrip();saveState();
}

// ── LOCAL STORAGE ──
const LS_KEY='finan_sim_t6_v19_anonymized_v1';
function saveState(){
  try{
    const snap=persons.map(p=>({id:p.id,status:p.status,adj:p.adj,pl_line:p.pl_line,alloc:{...p.alloc},_new:p._new||false,...(p._new?{name:p.name,position:p.position,dept:p.dept,dept_label:p.dept_label,income:p.income,base:p.base}:{})}));
    localStorage.setItem(LS_KEY,JSON.stringify({ts:Date.now(),persons:snap}));
    const ind=document.getElementById('save-indicator');
    if(ind){ind.textContent='✓ Saved';ind.style.color='var(--green)';setTimeout(()=>{ind.textContent='Auto-saved';ind.style.color='var(--dim)';},1500);}
  }catch(e){console.warn('Save failed',e);}
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY); if(!raw) return false;
    const saved=JSON.parse(raw); if(!saved?.persons?.length) return false;
    saved.persons.forEach(s=>{
      if(s._new){
        if(!persons.find(p=>p.id===s.id)) persons.push({id:s.id,name:s.name,position:s.position||'',dept:s.dept,dept_label:s.dept_label,income:s.income||0,base:s.base,adj:s.adj||0,status:s.status,pl_line:s.pl_line,alloc:{...s.alloc},_new:true});
      } else {
        const p=persons.find(x=>x.id===s.id);
        if(p){p.status=s.status;p.adj=s.adj||0;p.pl_line=s.pl_line;p.alloc={...s.alloc};}
      }
    });
    return true;
  }catch(e){return false;}
}
function clearSavedState(){
  if(!confirm('Xoá toàn bộ dữ liệu đã lưu và reset về T5 gốc?')) return;
  localStorage.removeItem(LS_KEY);
  persons=PERSONS_RAW.map(p=>({...p,alloc:{...p.alloc}}));
  buildTable();updateStrip();
}

      by_bu:Object.fromEntries(BUS.map(b=>[b.label,active.reduce((s,p)=>s+buCost(p,b.key),0)])),
      by_pl_line:Object.fromEntries(PL_LINES.map(l=>[l,active.filter(p=>p.pl_line===l).reduce((s,p)=>s+effectiveCost(p),0)]))},
    persons:persons.map(p=>({id:p.id,name:p.name,position:p.position,dept:p.dept,pl_line:p.pl_line,status:p.status,income:p.income||0,base_cost:p.base,adjustment:p.adj||0,effective_cost:effectiveCost(p),allocations:Object.fromEntries(BUS.map(b=>[b.key,{pct:p.alloc[b.key]||0,amount:Math.round(buCost(p,b.key))}]))}))};
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='finan_staffcost_t6.json';a.click();
}

  const buGrand=buTotals.reduce((s,b)=>s+b.total,0);
  const s1=[['=== SUMMARY BY BU/SEGMENT ==='],['BU/Segment','Cost (VND)','Cost (tr)','% Total EC','HC'],

    ['Unallocated',gEC-buGrand,((gEC-buGrand)/1e6).toFixed(1),(gEC?((gEC-buGrand)/gEC*100).toFixed(1):'0')+'%','']];
  const s2=[[''],['=== SUMMARY BY P&L LINE ==='],['P&L Line','HC','Total Cost (VND)','Total (tr)','Allocated (tr)','Unalloc (tr)','% Total'],
    ...PL_LINES.map(l=>{const lp=active.filter(p=>p.pl_line===l);const tot=lp.reduce((s,p)=>s+effectiveCost(p),0);const alloc=lp.reduce((s,p)=>s+BUS.reduce((ss,b)=>ss+buCost(p,b.key),0),0);return[l,lp.length,tot,(tot/1e6).toFixed(1),(alloc/1e6).toFixed(1),((tot-alloc)/1e6).toFixed(1),(gEC?(tot/gEC*100).toFixed(1):'0')+'%'];}),
    ['TOTAL',active.length,gEC,(gEC/1e6).toFixed(1),(buGrand/1e6).toFixed(1),((gEC-buGrand)/1e6).toFixed(1),'100%']];
  const s3=[[''],['=== CROSS TABLE: P&L LINE x BU/SEGMENT (tr VND) ==='],['P&L Line',...BUS.map(b=>b.label),'Line Total (tr)','EC Total (tr)','Unalloc (tr)'],
    ...PL_LINES.map(l=>{const lp=active.filter(p=>p.pl_line===l);const lineEC=lp.reduce((s,p)=>s+effectiveCost(p),0);const buVals=BUS.map(b=>lp.reduce((s,p)=>s+buCost(p,b.key),0));const rowTotal=buVals.reduce((s,v)=>s+v,0);return[l,...buVals.map(v=>(v/1e6).toFixed(1)),(rowTotal/1e6).toFixed(1),(lineEC/1e6).toFixed(1),((lineEC-rowTotal)/1e6).toFixed(1)];}),
    ['TOTAL',...BUS.map(b=>(buTotals.find(x=>x.key===b.key)?.total||0)/1e6).map(v=>v.toFixed(1)),(buGrand/1e6).toFixed(1),(gEC/1e6).toFixed(1),((gEC-buGrand)/1e6).toFixed(1)]];
  const csv=[...s1,...s2,...s3].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));a.download='finan_staffcost_t6_summary.csv';a.click();

// ── IMPORT CSV ──
function triggerImportCSV(){
  if(!confirm('Import CSV sẽ cập nhật adj, status, alloc % và P&L line cho từng nhân sự theo ID.\nNhân sự mới (ID không có trong gốc) sẽ được thêm vào.\nTiếp tục?')) return;
  document.getElementById('csv-file-input').click();
}

function importCSV(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const text = e.target.result;
      const rows = parseCSVText(text);
      if(rows.length < 2){ alert('File CSV không có data'); return; }

      const headers = rows[0].map(h => h.trim());
      const BU_ALLOC_KEYS = {
        'SBH Own Channel % Alloc':  'SBH_own',
        'SBH Partnership % Alloc':  'SBH_partner',
        'HLB % Alloc':              'HLB',
        'BU3 — FinanOne % Alloc':   'BU3',
        'Corp. Shared Svc % Alloc': 'CSS',
      };

      const col = name => headers.indexOf(name);
      const pn  = v => { const s=String(v||'').trim().replace(/,/g,''); return s==='-'||s===''?0:parseFloat(s)||0; };

      let updated=0, added=0, skipped=0;

      rows.slice(1).forEach(row => {
        if(row.every(c=>!c.trim())) return; // skip blank rows
        const id  = parseInt(pn(row[col('ID')]));
        const name = (row[col('Name')]||'').trim();
        if(!id && !name){ skipped++; return; }

        // alloc
        const alloc = {};
        Object.entries(BU_ALLOC_KEYS).forEach(([header, key]) => {
          const ci = col(header);
          alloc[key] = ci >= 0 ? pn(row[ci]) : 0;
        });

        const adj      = Math.round(pn(row[col('Adj (VND)')]) );
        const status   = (row[col('Status')]||'active').trim();
        const pl_line  = (row[col('P&L Line')]||'').trim();
        const dept     = (row[col('Dept')]||'').trim();
        const position = (row[col('Position')]||'').trim();
        const base     = Math.round(pn(row[col('Base (VND)')]));
        const income   = Math.round(pn(row[col('Fixed Income')]));

        // Try match by ID first, then by name+dept
        let existing = id ? persons.find(p => p.id === id) : null;
        if(!existing && name) existing = persons.find(p => p.name === name && (!dept || p.dept === dept));

        if(existing){
          existing.adj      = adj;
          existing.status   = status || existing.status;
          existing.pl_line  = pl_line || existing.pl_line;
          existing.alloc    = {...existing.alloc, ...alloc};
          updated++;
        } else if(name && base > 0){
          // New person not in original dataset
          persons.push({
            id: id || Date.now() + added,
            name, position, dept,
            dept_label: DEPT_LABELS[dept] || dept,
            income, base, adj,
            status: status || 'active',
            pl_line: pl_line || DEPT_PL[dept] || '7.99 Khác',
            alloc, _new: true,
          });
          added++;
        } else {
          skipped++;
        }
      });

      buildTable();
      updateStrip();
      saveState();

      // Reset file input so same file can be re-imported
      event.target.value = '';

      alert(`Import hoàn tất:\n✓ Cập nhật: ${updated} nhân sự\n✦ Thêm mới: ${added} nhân sự\n— Bỏ qua: ${skipped} dòng`);
    } catch(err){
      console.error('Import error:', err);
      alert('Lỗi đọc CSV: ' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSVText(text){
  // Strip BOM
  if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row = [], cell = '', inQuote = false;
  for(let i = 0; i < text.length; i++){
    const ch = text[i], next = text[i+1];
    if(inQuote){
      if(ch === '"' && next === '"'){ cell += '"'; i++; }
      else if(ch === '"'){ inQuote = false; }
      else { cell += ch; }
    } else {
      if(ch === '"'){ inQuote = true; }
      else if(ch === ','){ row.push(cell); cell = ''; }
      else if(ch === '\n' || (ch === '\r' && next === '\n')){
        row.push(cell); rows.push(row);
        row = []; cell = '';
        if(ch === '\r') i++;
      } else { cell += ch; }
    }
  }
  if(cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}
